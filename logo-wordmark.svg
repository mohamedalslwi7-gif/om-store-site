<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" width="640" height="180">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Cormorant+Garamond:wght@500&amp;display=swap');
      .mono { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; }
      .label { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 500; }
    </style>
  </defs>

  <rect width="640" height="180" fill="#0B0B0C"/>

  <text x="320" y="92" class="mono" font-size="64" letter-spacing="2" fill="#C9A24B" text-anchor="middle">
    OM <tspan fill="#F4EFE6" font-size="46" letter-spacing="10">STORE</tspan>
  </text>

  <line x1="180" y1="118" x2="460" y2="118" stroke="#C9A24B" stroke-width="1.5" stroke-dasharray="4,3"/>

  <text x="320" y="145" class="label" font-size="16" letter-spacing="8" fill="#C9A24B" text-anchor="middle">MEN'S FASHION</text>
</svg>
