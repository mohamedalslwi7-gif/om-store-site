<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="480" height="480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Cormorant+Garamond:wght@500&amp;display=swap');
      .mono { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; }
      .label { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 500; }
    </style>
    <path id="arcTop" d="M 40,120 A 80,80 0 0 1 200,120" fill="none"/>
  </defs>

  <rect width="240" height="240" fill="#0B0B0C"/>

  <!-- outer ring -->
  <circle cx="120" cy="120" r="108" fill="none" stroke="#C9A24B" stroke-width="1.5"/>
  <!-- inner ring: stitched, tailoring signature -->
  <circle cx="120" cy="120" r="96" fill="none" stroke="#C9A24B" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- top arc label -->
  <text class="label" font-size="13" letter-spacing="4" fill="#C9A24B">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">MEN'S FASHION</textPath>
  </text>

  <!-- monogram -->
  <text class="mono" x="120" y="144" font-size="66" letter-spacing="-3" fill="#C9A24B" text-anchor="middle">OM</text>

  <!-- stitch line under monogram -->
  <line x1="82" y1="160" x2="158" y2="160" stroke="#C9A24B" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- store label -->
  <text class="label" x="120" y="180" font-size="17" letter-spacing="7" fill="#F4EFE6" text-anchor="middle">STORE</text>
</svg>
