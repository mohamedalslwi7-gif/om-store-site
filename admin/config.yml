backend:
  name: github
  repo: mohamedalslwi7-gif/om-store-site
  branch: main

media_folder: ""
public_folder: "/"

collections:
  - name: "products"
    label: "المنتجات"
    files:
      - name: "products"
        label: "قائمة المنتجات"
        file: "products.json"
        fields:
          - name: "products"
            label: "المنتجات"
            widget: "list"
            label_singular: "منتج"
            summary: "{{fields.name}}"
            fields:
              - { name: "name", label: "اسم المنتج", widget: "string" }
              - { name: "category", label: "التصنيف", widget: "string", required: false }
              - { name: "description", label: "الوصف", widget: "text", required: false }
              - { name: "image", label: "صورة المنتج", widget: "image" }
              - { name: "exclusive", label: "إظهار ملصق حصريًا لدى OM Store", widget: "boolean", default: false }
